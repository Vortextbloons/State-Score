# Air - Go hot-reload configuration
# Install: go install github.com/air-verse/air@latest

root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/statescore.exe"
  cmd = "go build -o ./tmp/statescore.exe ./cmd/statescore"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "frontend", "node_modules", "web", "datasets"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "0s"
  log = "build-errors.log"
  send_interrupt = false
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = true
